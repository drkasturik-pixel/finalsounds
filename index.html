<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Match the Animal Sound</title>
    <style>
        :root {
            --jungle-green: #2d5a27;
            --sunny-yellow: #f1c40f;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background-color: #a8e063;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                              url('[images.unsplash.com](https://images.unsplash.com/photo-1502082553048-f009c37129b9?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80)');
            background-size: cover;
            background-position: center;
        }

        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #splash-screen img {
            width: 300px;
            max-width: 80%;
        }

        /* Instructions Overlay */
        #instructions-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            z-index: 900;
            text-align: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px;
        }

        /* Game Board */
        #main-game {
            display: none;
            width: 95%;
            height: 90%;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        .column {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            gap: 10px;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            border: 4px solid var(--jungle-green);
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 20%;
        }

        .animal-card img {
            height: 90%;
            width: auto;
            object-fit: contain;
        }

        .sound-card {
            background: var(--sunny-yellow);
            font-size: 40px;
        }

        .selected {
            border-color: #e67e22;
            transform: scale(1.05);
            box-shadow: 0 0 15px #e67e22;
        }

        .matched {
            visibility: hidden;
        }

        /* Feedback Overlays */
        #feedback {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            font-weight: bold;
            text-align: center;
            z-index: 2000;
            pointer-events: none;
        }

        .stars { color: gold; font-size: 80px; }
        .try-again { color: #e74c3c; background: white; padding: 20px; border-radius: 20px; }

        /* End Screen */
        #end-screen {
            display: none;
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            background: var(--jungle-green);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Logo Screen -->
    <div id="splash-screen">
        <img src="[raw.githubusercontent.com](https://raw.githubusercontent.com/drkasturik-pixel/finalsounds/main/assets/innovine-logo.png)" alt="Innovine Logo">
    </div>

    <!-- Instructions -->
    <div id="instructions-screen">
        <h1>Match the Animal Sound</h1>
        <p style="font-size: 24px;">Click on each sound card and click on the matching animal picture.</p>
        <button onclick="startGame()">Start Game</button>
    </div>

    <!-- Game Board -->
    <div id="main-game">
        <div class="column" id="animal-col"></div>
        <div class="column" id="sound-col"></div>
    </div>

    <!-- Feedback -->
    <div id="feedback"></div>

    <!-- Result -->
    <div id="end-screen">
        <h1>Great Job!</h1>
        <p id="final-score" style="font-size: 28px;"></p>
        <button onclick="location.reload()">Play Again</button>
    </div>
</div>

<script>
    const animals = [
        { id: 'cow', img: 'cow.jpg', snd: 'moo.mp3.mp3' },
        { id: 'dog', img: 'dog.jpg', snd: 'woof.mp3.mp3' },
        { id: 'cat', img: 'cat.jpg', snd: 'meow.mp3.mp3' },
        { id: 'horse', img: 'horse.jpg', snd: 'neigh.mp3.mp3' },
        { id: 'pig', img: 'pig.jpg', snd: 'oink.mp3.mp3' },
        { id: 'lion', img: 'lion.jpg', snd: 'growl.mp3.mp3' }, // Note: Using growl as roar source wasn't listed
        { id: 'snake', img: 'snake.jpg', snd: 'hiss.mp3.mp3' },
        { id: 'tiger', img: 'tiger.jpg', snd: 'growl.mp3.mp3' }
    ];

    const baseUrl = "[raw.githubusercontent.com](https://raw.githubusercontent.com/drkasturik-pixel/finalsounds/main/assets/)";
    
    let selectedAnimal = null;
    let selectedSound = null;
    let score = 0;
    let matchesFound = 0;

    // Initial sequence
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('instructions-screen').style.display = 'flex';
            speak("Click on each sound card and click on the matching animal picture.");
        }, 5000);
    };

    function speak(text) {
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        window.speechSynthesis.speak(msg);
    }

    function startGame() {
        document.getElementById('instructions-screen').style.display = 'none';
        document.getElementById('main-game').style.display = 'grid';
        initGame();
    }

    function initGame() {
        const animalCol = document.getElementById('animal-col');
        const soundCol = document.getElementById('sound-col');
        
        // Shuffle animals and sounds separately
        const shuffledAnimals = [...animals].sort(() => Math.random() - 0.5);
        const shuffledSounds = [...animals].sort(() => Math.random() - 0.5);

        shuffledAnimals.forEach(animal => {
            const div = document.createElement('div');
            div.className = 'card animal-card';
            div.innerHTML = `<img src="${baseUrl}${animal.img}" alt="${animal.id}">`;
            div.onclick = () => selectAnimal(animal.id, div);
            animalCol.appendChild(div);
        });

        shuffledSounds.forEach(sound => {
            const div = document.createElement('div');
            div.className = 'card sound-card';
            div.innerHTML = '🔊';
            div.onclick = () => selectSound(sound.id, sound.snd, div);
            soundCol.appendChild(div);
        });
    }

    function selectAnimal(id, element) {
        if (selectedAnimal) selectedAnimal.el.classList.remove('selected');
        selectedAnimal = { id, el: element };
        element.classList.add('selected');
        checkMatch();
    }

    function selectSound(id, sndFile, element) {
        if (selectedSound) selectedSound.el.classList.remove('selected');
        selectedSound = { id, el: element };
        element.classList.add('selected');
        
        // Play audio
        const audio = new Audio(baseUrl + sndFile);
        audio.play();
        
        checkMatch();
    }

    function checkMatch() {
        if (selectedAnimal && selectedSound) {
            if (selectedAnimal.id === selectedSound.id) {
                handleSuccess();
            } else {
                handleFailure();
            }
        }
    }

    function handleSuccess() {
        score += 10;
        matchesFound++;
        showFeedback('<div class="stars">⭐⭐⭐</div>👍');
        
        const aEl = selectedAnimal.el;
        const sEl = selectedSound.el;
        
        setTimeout(() => {
            aEl.classList.add('matched');
            sEl.classList.add('matched');
            resetSelection();
            if (matchesFound === animals.length) endGame();
        }, 1000);
        
        new Audio(baseUrl + 'correct.mp3.mp3').play();
    }

    function handleFailure() {
        showFeedback('<div class="try-again">Try Again!</div>');
        new Audio(baseUrl + 'wrong.mp3.mp3').play();
        speak("Try again");
        
        setTimeout(() => {
            resetSelection();
        }, 1000);
    }

    function resetSelection() {
        if (selectedAnimal) selectedAnimal.el.classList.remove('selected');
        if (selectedSound) selectedSound.el.classList.remove('selected');
        selectedAnimal = null;
        selectedSound = null;
    }

    function showFeedback(html) {
        const fb = document.getElementById('feedback');
        fb.innerHTML = html;
        fb.style.display = 'block';
        setTimeout(() => fb.style.display = 'none', 1000);
    }

    function endGame() {
        document.getElementById('main-game').style.display = 'none';
        document.getElementById('end-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `Final Score: ${score}`;
        speak(`Well done! Your score is ${score}`);
    }
</script>

</body>
</html>
