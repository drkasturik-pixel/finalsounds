<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Match Animal To Sound</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
}

body{
background:url("https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=1200&q=80");
background-size:cover;
background-position:center;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hidden{
display:none;
}

/* LOGO SCREEN */

#logoScreen{
background:white;
}

#logo{
width:320px;
max-width:80%;
}

/* INSTRUCTIONS */

#instructionScreen{
background:rgba(255,255,255,0.95);
padding:20px;
text-align:center;
}

#instructionScreen h1{
color:#0a7d3b;
margin-bottom:20px;
font-size:36px;
}

#instructionScreen p{
font-size:24px;
margin-bottom:20px;
line-height:1.5;
}

#startBtn{
padding:15px 35px;
font-size:24px;
border:none;
border-radius:15px;
background:#28a745;
color:white;
cursor:pointer;
}

/* GAME */

#gameScreen{
padding:10px;
}

.gameContainer{
width:100%;
height:100%;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.column{
width:50%;
display:flex;
flex-direction:column;
gap:8px;
justify-content:center;
}

/* ANIMALS */

.animalCard{
background:white;
border-radius:15px;
padding:5px;
cursor:pointer;
border:4px solid transparent;
}

.animalCard img{
width:100%;
height:150px;
object-fit:cover;
display:block;
border-radius:12px;
}

.selectedAnimal{
border:4px solid orange;
}

.correct{
border:4px solid green;
opacity:0.4;
pointer-events:none;
}

/* SOUNDS */

.soundCard{
background:#fff5b1;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
border-radius:15px;
cursor:pointer;
border:4px solid transparent;
}

.selected{
border:4px solid orange;
}

.done{
opacity:0.4;
pointer-events:none;
}

/* MESSAGE */

#message{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
font-size:40px;
font-weight:bold;
color:white;
text-shadow:2px 2px 4px black;
z-index:999;
}

/* FINAL SCREEN */

#finalScreen{
background:rgba(255,255,255,0.96);
}

#scoreText{
font-size:48px;
color:green;
margin-bottom:25px;
}

#playAgain{
padding:15px 35px;
font-size:24px;
border:none;
border-radius:15px;
background:#ff6600;
color:white;
cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

.animalCard img{
height:95px;
}

.soundCard{
font-size:16px;
padding:12px;
}

#message{
font-size:28px;
}

}

</style>
</head>
<body>

<!-- LOGO SCREEN -->

<div id="logoScreen" class="screen">

<img
id="logo"
src="assets/innovineNSTRUCTION SCREEN -->

<div id="instructionScreen" class="screen hidden">

<h1>Match The Animal To Its Sound</h1>

<p>
Click on a sound card.<br>
Listen carefully.<br>
Then click the matching animal picture.
</p>

<button id="startBtn">
Start Game
</button>

</div>

<!-- GAME SCREEN -->

<div id="gameScreen" class="screen hidden">

<div id="message"></div>

<div class="gameContainer">

<div
id="animalColumn"
class="column">
</div>

<div
id="soundColumn"
class="column">
</div>

</div>

</div>

<!-- FINAL -->

<div id="finalScreen" class="screen hidden">

<h1 id="scoreText"></h1>

<button id="playAgain">
Play Again
</button>

</div>

<script>

/* ANIMAL DATA */

const animals=[

{
name:"cow",
img:"assets/cow.jpg",
sound:"MOO",
audio:"assets/moo.mp3.mp3"
},

{
name:"dog",
img:"assets/dog.jpg",
sound:"WOOF",
audio:"assets/woof.mp3.mp3"
},

{
name:"cat",
img:"assets/cat.jpg",
sound:"MEOW",
audio:"assets/meow.mp3.mp3"
},

{
name:"horse",
img:"assets/horse.jpg",
sound:"NEIGH",
audio:"assets/neigh.mp3.mp3"
},

{
name:"pig",
img:"assets/pig.jpg",
sound:"OINK",
audio:"assets/oink.mp3.mp3"
},

{
name:"lion",
img:"assets/lion.jpg",
sound:"ROAR",
audio:"assets/roar.mp3.mp3"
},

{
name:"snake",
img:"assets/snake.jpg",
sound:"HISS",
audio:"assets/hiss.mp3.mp3"
},

{
name:"tiger",
img:"assets/tiger.jpg",
sound:"GROWL",
audio:"assets/growl.mp3.mp3"
}

];

/* PRELOAD */

animals.forEach(a=>{
const img=new Image();
img.src=a.img;
});

const correctAudio=
new Audio("assets/correct.mp3.mp3");

const wrongAudio=
new Audio("assets/wrong.mp3.mp3");

/* VARIABLES */

let selectedSound=null;
let score=0;

const msg=
document.getElementById("message");

/* SPEECH */

function speak(text){

if("speechSynthesis" in window){

speechSynthesis.cancel();

const speech=
new SpeechSynthesisUtterance(text);

speech.rate=0.9;
speech.pitch=1.1;

speechSynthesis.speak(speech);
}

}

/* LOGO SCREEN */

setTimeout(()=>{

document
.getElementById("logoScreen")
.classList.add("hidden");

document
.getElementById("instructionScreen")
.classList.remove("hidden");

speak(
"Click the sound card and then click the matching animal picture."
);

},5000);

/* START */

document
.getElementById("startBtn")
.addEventListener("click",()=>{

document
.getElementById("instructionScreen")
.classList.add("hidden");

document
.getElementById("gameScreen")
.classList.remove("hidden");

loadGame();

speak(
"Find the matching animal for each sound."
);

});

/* SHUFFLE */

function shuffle(array){

return array.sort(
()=>Math.random()-0.5
);

}

/* LOAD GAME */

function loadGame(){

const animalColumn=
document.getElementById("animalColumn");

const soundColumn=
document.getElementById("soundColumn");

animalColumn.innerHTML="";
soundColumn.innerHTML="";

animals.forEach(animal=>{

const card=
document.createElement("div");

card.className="animalCard";

card.dataset.animal=
animal.name;

card.innerHTML=
`${animal.img}`;

card.onclick=()=>{

checkAnswer(
animal.name,
card
);

};

animalColumn.appendChild(card);

});

const shuffled=
shuffle([...animals]);

shuffled.forEach(animal=>{

const soundCard=
document.createElement("div");

soundCard.className=
"soundCard";

soundCard.dataset.animal=
animal.name;

soundCard.innerHTML=
`🔊 ${animal.sound}`;

soundCard.onclick=()=>{

document
.querySelectorAll(".soundCard")
.forEach(c=>
c.classList.remove("selected")
);

soundCard.classList.add(
"selected"
);

selectedSound=
animal.name;

new Audio(
animal.audio
).play();

};

soundColumn.appendChild(
soundCard
);

});

}

/* CHECK ANSWER */

function checkAnswer(
animalName,
animalCard
){

if(!selectedSound){

msg.innerHTML=
"Select a Sound First";

setTimeout(()=>{
msg.innerHTML="";
},1000);

return;

}

if(selectedSound===animalName){

score++;

correctAudio.play();

msg.innerHTML=
"⭐⭐⭐ 👍";

const soundCard=
document.querySelector(
`.soundCard[data-animal="${animalName}"]`
);

animalCard.classList.add(
"correct"
);

soundCard.classList.add(
"done"
);

setTimeout(()=>{

animalCard.remove();
soundCard.remove();

msg.innerHTML="";

selectedSound=null;

checkFinished();

},1200);

}
else{

wrongAudio.play();

msg.innerHTML=
"❌ TRY AGAIN";

speak(
"Try again"
);

setTimeout(()=>{

msg.innerHTML="";

},1500);

}

}

/* FINISH */

function checkFinished(){

if(
document.querySelectorAll(
".animalCard"
).length===0
){

document
.getElementById("gameScreen")
.classList.add("hidden");

document
.getElementById("finalScreen")
.classList.remove("hidden");

document
.getElementById("scoreText")
.innerHTML=
`🎉 Score ${score} / 8`;

speak(
"Congratulations. Your score is "
+
score
+
" out of 8"
);

}

}

/* PLAY AGAIN */

document
.getElementById("playAgain")
.onclick=()=>{

location.reload();

};

</script>

</body>
</html>
